name: Eve release evals

on:
  pull_request:
    paths:
      - "agent/**"
      - "evals/**"
      - "src/lib/eve/**"
      - "eve.release.json"
      - "next.config.ts"
      - "package.json"
      - "pnpm-lock.yaml"
  push:
    branches: [main]
    paths:
      - "agent/**"
      - "evals/**"
      - "src/lib/eve/**"
      - "eve.release.json"
      - "next.config.ts"
      - "package.json"
      - "pnpm-lock.yaml"
  schedule:
    - cron: "17 2 * * *"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: eve-evals-${{ github.ref }}
  cancel-in-progress: true

jobs:
  strict-evals:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      AI_GATEWAY_API_KEY: ${{ secrets.AI_GATEWAY_API_KEY }}
      VERCEL_OIDC_TOKEN: ${{ secrets.VERCEL_OIDC_TOKEN }}
      EVE_EVALS_ENABLED: "true"
      EVE_EVAL_INGEST_URL: ${{ secrets.EVE_EVAL_INGEST_URL }}
      EVE_EVAL_REPORTER_SECRET: ${{ secrets.EVE_EVAL_REPORTER_SECRET }}
      EVE_BASE_REF: ${{ github.event.pull_request.base.sha || github.event.before }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Require judge and ingestion credentials
        shell: bash
        run: |
          if [[ -z "${AI_GATEWAY_API_KEY}" && -z "${VERCEL_OIDC_TOKEN}" ]]; then
            echo "AI_GATEWAY_API_KEY or VERCEL_OIDC_TOKEN is required."
            exit 1
          fi
          if [[ -z "${EVE_EVAL_INGEST_URL}" || -z "${EVE_EVAL_REPORTER_SECRET}" ]]; then
            echo "Signed Convex eval ingestion credentials are required."
            exit 1
          fi

      - run: pnpm eve:baseline:sync
      - run: pnpm eve:release:check
      - run: pnpm eve:eval

      - name: Upload sanitized and full CI artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eve-evals-${{ github.run_id }}
          path: |
            .eve/evals/
            .eve/junit.xml
          if-no-files-found: warn
          retention-days: 14
